<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In – SaloneMedConnect</title>
  <meta name="description" content="Sign in to your SaloneMedConnect account to manage appointments, access health records, and connect with doctors across Sierra Leone.">
  <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <a href="../index.html">
        <div class="auth-logo-icon"><i class="fas fa-heartbeat"></i></div>
        <span class="brand-name">SaloneMedConnect</span>
        <span class="brand-sub">Digital Healthcare · Sierra Leone</span>
      </a>
    </div>

    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Sign in to access your health dashboard, appointments, and more from any device.</p>

    <!-- Alert -->
    <div class="auth-alert" id="auth-alert" role="alert" aria-live="polite">
      <i class="fas fa-info-circle"></i>
      <span id="auth-alert-msg"></span>
    </div>

    <!-- Login Form -->
    <form class="auth-form" id="login-form" novalidate>

      <div class="form-group">
        <label for="login-email">Email Address</label>
        <div class="input-icon-wrap">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" id="login-email" name="email" class="form-input"
            placeholder="your@email.com" autocomplete="email" required>
        </div>
        <span class="error-message" id="login-email-error" role="alert">
          <i class="fas fa-exclamation-circle"></i><span></span>
        </span>
      </div>

      <div class="form-group">
        <label for="login-password">Password</label>
        <div class="input-icon-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="login-password" name="password" class="form-input"
            placeholder="Enter your password" autocomplete="current-password" required>
          <button type="button" class="password-toggle" id="toggle-pw" aria-label="Toggle password visibility">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <span class="error-message" id="login-password-error" role="alert">
          <i class="fas fa-exclamation-circle"></i><span></span>
        </span>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <label style="display:flex;align-items:center;gap:0.5rem;font-size:var(--font-size-xs);color:var(--gray-500);cursor:pointer">
          <input type="checkbox" id="remember-me" style="accent-color:var(--primary-color)">
          Remember me
        </label>
        <a href="#" style="font-size:var(--font-size-xs);color:var(--primary-color)">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary auth-submit btn-ripple" id="login-btn">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>

    </form>

    <div class="auth-switch">
      Don't have an account? <a href="signup.html">Create one free</a>
    </div>

    <div style="text-align:center;margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--gray-100)">
      <a href="../index.html" style="font-size:var(--font-size-xs);color:var(--gray-400)">
        <i class="fas fa-arrow-left"></i> Back to SaloneMedConnect
      </a>
    </div>

  </div>
</div>

<script src="../js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  // Redirect if already logged in
  if (Auth.isLoggedIn()) {
    const params = new URLSearchParams(window.location.search);
    window.location.href = params.get('redirect') === 'dashboard' ? 'dashboard.html' : '../index.html';
    return;
  }

  const form     = document.getElementById('login-form');
  const alert    = document.getElementById('auth-alert');
  const alertMsg = document.getElementById('auth-alert-msg');
  const btn      = document.getElementById('login-btn');

  // Check for redirect message (e.g. "after booking")
  const params = new URLSearchParams(window.location.search);
  if (params.get('msg') === 'booking') {
    showAlert('Your appointment was saved! Sign in or create an account to view your booking dashboard.', 'success');
  }
  if (params.get('msg') === 'required') {
    showAlert('Please sign in to access that page.', 'error');
  }

  // Password toggle
  document.getElementById('toggle-pw').addEventListener('click', function() {
    const pw = document.getElementById('login-password');
    const isText = pw.type === 'text';
    pw.type = isText ? 'password' : 'text';
    this.querySelector('i').className = isText ? 'fas fa-eye' : 'fas fa-eye-slash';
  });

  // Form submit
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErrors();

    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    let valid = true;

    if (!email) { showFieldError('login-email', 'Email is required.'); valid = false; }
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showFieldError('login-email', 'Enter a valid email address.'); valid = false; }
    if (!password) { showFieldError('login-password', 'Password is required.'); valid = false; }
    if (!valid) return;

    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner anim-spin"></i> Signing in...';
    btn.disabled = true;

    await new Promise(r => setTimeout(r, 900));

    const result = Auth.login(email, password);
    btn.innerHTML = orig;
    btn.disabled = false;

    if (result.success) {
      showAlert(`Welcome back, ${result.user.fullName.split(' ')[0]}! Redirecting...`, 'success');
      setTimeout(() => {
        const redirectTo = params.get('redirect');
        if (redirectTo === 'dashboard') window.location.href = 'dashboard.html';
        else if (redirectTo) window.location.href = redirectTo;
        else window.location.href = 'dashboard.html';
      }, 1200);
    } else {
      showAlert(result.message, 'error');
    }
  });

  function showAlert(msg, type) {
    alertMsg.textContent = msg;
    alert.className = `auth-alert ${type} show`;
    alert.querySelector('i').className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-times-circle';
  }

  function showFieldError(id, msg) {
    const el  = document.getElementById(id);
    const err = document.getElementById(id + '-error');
    el?.classList.add('error');
    if (err) { err.querySelector('span').textContent = msg; err.classList.add('show'); }
  }

  function clearErrors() {
    document.querySelectorAll('.form-input.error').forEach(el => el.classList.remove('error'));
    document.querySelectorAll('.error-message.show').forEach(el => el.classList.remove('show'));
    alert.className = 'auth-alert';
  }
});
</script>
</body>
</html>
